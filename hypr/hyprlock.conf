general {
    ignore_empty_input = true
}

background {
    monitor =
    path = /home/felix/.local/share/wallpapers/custom-wallpapers/dark-waters.jpg
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center
    inner_color = rgba(18, 18, 18, 0.8)
    outer_color = rgba(190, 190, 190, 1.0)
    outline_thickness = 4
    font_family = JetBrainsMono Nerd Font Propo
    font_color = rgba(190, 190, 190, 1.0)
    placeholder_text = Enter Password
    check_color = rgba(230, 142, 13, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%-I:%M %p')"
    color = rgba(190, 190, 190, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 275
    halign = center
    valign = center
    shadow_passes = 0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%A, %B %-d')"
    color = rgba(190, 190, 190, 0.6)
    font_size = 24
    font_family = JetBrainsMono Nerd Font Propo
    position = 0, 165
    halign = center
    valign = center
    shadow_passes = 0
}

auth {
    fingerprint:enabled = false
}
